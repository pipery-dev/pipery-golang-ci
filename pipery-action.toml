owner = "pipery-dev"
action_name = "pipery-golang-ci"
title = "Pipery Go CI"
description = "CI pipeline for Go: SAST, SCA, lint, build, test, versioning, packaging, release, reintegration"
marketplace_category = "continuous-integration"
author = "pipery-dev"
action_type = "composite"
default_branch = "main"
version = "1.0.0"
repository_visibility = "public"
icon = "assets/icon.png"
test_command = ""
test_project_path = "test-project"
test_project_input = "project_path"
test_log_path = "pipery.jsonl"
test_log_success_values = ["success", "succeeded", "passed", "ok"]
cleanup_paths = ["pipery.jsonl"]

[[inputs]]
name = "project_path"
description = "Path to the project source tree the action should operate on."
required = false
default = "."

[[inputs]]
name = "config_file"
description = "Path to Pipery config file."
required = false
default = ".github/pipery/config.yaml"

[[inputs]]
name = "go_version"
description = "Go version to use."
required = false
default = "1.22"

[[inputs]]
name = "skip_sast"
description = "Skip SAST step."
required = false
default = "false"

[[inputs]]
name = "skip_sca"
description = "Skip SCA step."
required = false
default = "false"

[[inputs]]
name = "skip_lint"
description = "Skip lint step."
required = false
default = "false"

[[inputs]]
name = "skip_build"
description = "Skip build step."
required = false
default = "false"

[[inputs]]
name = "tests_path"
description = "Go package path for tests (e.g. ./pkg/...). Defaults to ./..."
required = false
default = "./..."

[[inputs]]
name = "skip_test"
description = "Skip test step."
required = false
default = "false"

[[inputs]]
name = "skip_versioning"
description = "Skip versioning step."
required = false
default = "false"

[[inputs]]
name = "skip_packaging"
description = "Skip packaging step."
required = false
default = "false"

[[inputs]]
name = "skip_release"
description = "Skip release step."
required = false
default = "false"

[[inputs]]
name = "skip_reintegration"
description = "Skip reintegration step."
required = false
default = "false"

[[inputs]]
name = "version_bump"
description = "Version bump type: patch, minor, or major."
required = false
default = "patch"

[[inputs]]
name = "github_token"
description = "GitHub token for release and reintegration steps."
required = false
default = ""

[[inputs]]
name = "log_file"
description = "Path to the JSONL log file written during the run."
required = false
default = "pipery.jsonl"

[[inputs]]
name = "registry"
description = "Container registry for packaging."
required = false
default = "ghcr.io"

[[inputs]]
name = "image_name"
description = "Container image name."
required = false
default = ""

[[test_log_required_fields]]
name = "event"
value = "build"
